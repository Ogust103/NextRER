        // Fonction pour formater le temps restant en "X min Y sec"
        function formatTimeRemaining(departureTime) {
            const now = new Date();
            const departure = new Date(departureTime);
            const diffMs = Math.max(0, departure - now);
            const diffMinutes = Math.floor(diffMs / 60000);
            const diffSeconds = Math.floor((diffMs % 60000) / 1000);
            return `${String(diffMinutes).padStart(2, '0')}:${String(diffSeconds).padStart(2, '0')}`;
        }

        // Fonction pour retourner le temps restant en minutes et secondes
        function getTimeRemaining(departureTime) {
            const now = new Date();
            const departure = new Date(departureTime);
            const diffMs = Math.max(0, departure - now);
            const diffMinutes = Math.floor(diffMs / 60000);
            const diffSeconds = Math.floor((diffMs % 60000) / 1000);
            return { minutes: String(diffMinutes), seconds: String(diffSeconds).padStart(2, '0') };
        }

        // Fonction pour mettre à jour l'affichage du temps restant
        function updateTimeRemaining(nextRersData, columnId) {
            const now = new Date();
            const list = document.getElementById(columnId);
            firstRer = nextRersData[0];
            // console.log(firstRer.vehicleJourneyName, "Arrival :", firstRer.expectedArrivalTime, now.toISOString(), firstRer.expectedArrivalTime > now.toISOString());
            // console.log(firstRer.vehicleJourneyName, "Departure :", firstRer.expectedDepartureTime, now.toISOString(), firstRer.expectedDepartureTime > now.toISOString());
            
            list.innerHTML = nextRersData.map((rer) => {
                if (rer.expectedArrivalTime > now.toISOString() || rer.expectedDepartureTime > now.toISOString()) {
                    const minutesSeconds = getTimeRemaining(rer.expectedDepartureTime);
                    const minutes3lettres = minutesSeconds.minutes.length > 2;
                    const isArriving = rer.expectedArrivalTime > now.toISOString();
                    
                    return `
                        <div class="cell">
                            <div class="cell-left">
                                <div class="name-rectangle">
                                    <span>${rer.vehicleJourneyName}</span>
                                </div>
                                <span class="direction-name">${rer.destinationName}</span>
                            </div>
                            <div class="cell-right">
                                <div class="time-container">
                                    <div ${isArriving ? 'class="minutes"' : 'class="on-platform"'} ${minutes3lettres ? 'style="font-size: 52px;"' : ''}>
                                        <span>${isArriving ? minutesSeconds.minutes : 'à quai'}</span>
                                    </div>
                                    ${isArriving ? `<span class="seconds"> : ${minutesSeconds.seconds}</span>` : ''}
                                </div>
                                <div class="platform-rectangle">
                                    <span class="text">quai</span>
                                    <span class="number">${rer.platform != "unknown" ? rer.platform : "-"}</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    return ""; // Ne rien afficher si le RER est déjà parti
                }            
            }).join("");
        }

        function updateWeatherDisplay(weatherData) {
            const actualTime = new Date();
            const weatherScreen = document.getElementById('weather-screen');
            const currentWeather = document.getElementById('current-weather');
            const hourlyWeather = document.getElementById('hourly-scrollbar');

            // Affichage de la météo actuelle
            if (weatherData.current) {
                weatherScreen.style.backgroundImage = `url('static/weather_images/${getWeatherImage(weatherData.current.weather_code, weatherData.current.is_day)}')`;
                document.getElementById('current-temp').textContent = `${weatherData.current.temperature}°C`;
            }

            dailyWeather = weatherData.daily ? weatherData.daily[formatLocalHour(actualTime).split('T')[0]] : null;
            if (dailyWeather) {
                document.getElementById('temperature-min').textContent = `${dailyWeather.temperature_min}°`;
                document.getElementById('temperature-max').textContent = `${dailyWeather.temperature_max}°`;
                document.getElementById('sunrise-time').textContent = dailyWeather.sunrise.split('T')[1].slice(0, 5);
                document.getElementById('sunset-time').textContent = dailyWeather.sunset.split('T')[1].slice(0, 5);
            }

            // Affichage des prévisions horaires
            if (weatherData.hourly) {
                for (const [time, data] of Object.entries(weatherData.hourly)) {
                    hourlyWeather.innerHTML += `
                        <div class="hourly-card" id="hourly-${time}">
                            <span>${time.split('T')[1]}</span>
                            <img src="static/weather_icons/${getWeatherIcon(data.weather_code, data.is_day)}" alt="Weather Icon" class="weather-icon" width="35">
                            <span>${data.temperature}°C</span>
                        </div>
                    `;
                }
                const card = document.getElementById(`hourly-${formatLocalHour(actualTime)}`);
                if (card) {
                    hourlyWeather.scrollTo({
                        left: card.offsetLeft - hourlyWeather.offsetLeft,
                        behavior: 'smooth'
                    });
                }
            }
        }

        function formatLocalHour(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const h = String(date.getHours()).padStart(2, '0');

            return `${y}-${m}-${d}T${h}:00`;
        }

        function getWeatherIcon(weatherCode, is_day) {
            const isDay = is_day === 1

            switch (weatherCode) {

                // ☀️ Clair à nuageux
                case 0:
                return isDay ? "day_1.png" : "night_1.png"
                case 1:
                return isDay ? "day_2.png" : "night_2.png"
                case 2:
                return isDay ? "day_3.png" : "night_3.png"
                case 3:
                return "cloudy.png"

                // 🌫️ Brouillard
                case 45:
                return "fog.png"
                case 48:

                // 🌧️ Bruine
                case 51:

                case 53:

                case 55:

                // 🧊 Grêle / grésil
                case 56:

                case 57:

                // 🌧️ Pluie
                case 61:

                case 63:

                case 65:

                // 🧊 Pluie verglaçante / grésil

                case 67:

                // ❄️ Neige
                case 71:

                case 73:

                case 75:
                return "snow_3.png"
                case 77:

                // 🌧️ Averses de pluie
                case 80:
                return isDay ? "day_rain.png" : "night_rain.png"
                case 81:
                return isDay ? "day_rain.png" : "night_rain.png"
                case 82:

                // 🌨️ Averses de neige

                case 96:

                case 99:
                return "storm.png"

                // 🔁 Fallback
                default:
                return isDay ? "day_1.png" : "night_1.png"
            }
        }

        // Fonction pour récupérer les données de l'API
        function fetchNextRers() {
            console.log("Fetching next RERs...");
            fetch(`/api/next_rers`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Erreur API: ${response.status} ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (!Array.isArray(data)) {
                        console.error("Invalid data format received", data);
                        throw new Error("Received data is not an array");
                    }
                    console.log("RATP data received:", data);
                    nextMainRersData = data.filter(rer => {
                        if (!rer) return false;
                        return (rer.quayRef && directions["main"].quayRef.includes(rer.quayRef)) || 
                               (rer.destinationCode && directions["main"].directionCodes.includes(rer.destinationCode));
                    }); // Filtre les RER allant vers Paris
                    nextSecondaryRersData = data.filter(rer => {
                        if (!rer) return false;
                        return (rer.quayRef && directions["secondary"].quayRef.includes(rer.quayRef)) || 
                               (rer.destinationCode && directions["secondary"].directionCodes.includes(rer.destinationCode));
                    }); // Filtre les RER allant vers Saint-Germain-en-Laye
                    updateTimeRemaining(nextMainRersData, 'main-rer-list'); // Met à jour l'affichage
                    updateTimeRemaining(nextSecondaryRersData, 'secondary-rer-list');
                })
                .catch(error => {
                    console.error("Error fetching RER data:", error);
                    document.getElementById('main-rer-list').innerHTML = `<div style="color: red; padding: 20px;">Connection error: ${error.message}</div>`;
                });
            lastFetchTime = Date.now();
        }

        function fetchWeather() {
            console.log("Fetching weather...");
            fetch(`/api/weather`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`API error: ${response.status} ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data || typeof data !== 'object') {
                        console.error("Invalid weather data format", data);
                        throw new Error("Invalid weather data format");
                    }
                    console.log("Weather data received:", data);
                    weatherData = data; // Stocke les données météo dans la variable globale
                    
                    // Vérifie que les données contiennent au moins les champs attendus
                    if (data.hourly && typeof data.hourly === 'object') {
                        updateWeatherDisplay(weatherData); // Met à jour l'affichage météo
                    } else {
                        console.warn("Incomplete weather data structure");
                    }
                })
                .catch(error => {
                    console.error("Error fetching weather data:", error);
                });
        }

        // Met à jour l'heure actuelle toutes les secondes
        setInterval(updateCurrentTime, 1000);
        // Met à jour le temps restant toutes les secondes
        setInterval(() => updateTimeRemaining(nextMainRersData, 'main-rer-list'), 1000);
        setInterval(() => updateTimeRemaining(nextSecondaryRersData, 'secondary-rer-list'), 1000);
        
        // Rafraîchit les données de l'API toutes les 10 secondes        
        setInterval(() => fetchNextRers(), requestInterval);

        // Rafraîchit les données météo toutes les 3 minutes
        setInterval(() => fetchWeather(), 180000); 

        // Charge les données au démarrage
        window.onload = () => {
            updateCurrentTime();
            fetchNextRers();
            fetchWeather();

            // Affiche les noms des directions dans les en-têtes
            document.getElementById("mainDirection").textContent = directions["main"].directionNames.join(" • ");
            document.getElementById("secondaryDirection").textContent = directions["secondary"].directionNames.join(" • ");
        };
