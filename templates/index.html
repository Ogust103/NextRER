<!-- templates/index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Prochains RER</title>

    <script id="directions-data" type="application/json">
        {{ directions | tojson }}
    </script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="main-screen">
        <div class ="header">
            <div class="left-header">
                <img src="{{ url_for('static', filename='Logo RERA 2.png') }}" alt="Logo RER A" width="180" class="logo">
                <h1 id="mainDirection"></h1>
            </div>
            <div class="hour-rectangle">
                <span id="current-time"></span>
            </div>
        </div>        

        <div class="horizontal-red-line"></div>
        
        <div class="column" id="main-rer-list">
        </div>

    </div>

    <div class="horizontal-black-line"></div>

    <div class="bottom-screen">
        <div class="secondary-screen">
            <div class="header">
                <div class="left-header">
                    <img src="{{ url_for('static', filename='Logo RERA 2.png') }}" alt="Logo RER A" width="120" class="logo">
                    <h1 id="secondaryDirection"></h1>
                </div>
            </div>

            <div class="horizontal-red-line"></div>

            <div class="column" id="secondary-rer-list"></div>
        </div>

        <div class="vertical-black-line"></div>

        <div class="weather-screen" id="weather-screen">
            <div class="current-weather" id="current-weather">
                <div class="current-weather-header">
                    <span class="temperature" id="temperature-min" style="color:#1B9BD3"></span>
                    <span class="date" id="current-date"></span>
                    <span class="temperature" id="temperature-max" style="color:#ED1C24"></span>
                </div>
                <div class="current-weather-sunrise">
                    <div class="suntime">
                        <img src="{{ url_for('static', filename='weather_icons/sunrise.png') }}" alt="Weather Icon" width="25">
                        <span id="sunrise-time"></span>
                    </div>
                    <div class="suntime">
                        <span id="sunset-time"></span>
                        <img src="{{ url_for('static', filename='weather_icons/sunset.png') }}" alt="Weather Icon" width="25">
                    </div>
                </div>
                <div class="current-weather-temperature">
                    <span class="temperature" id="current-temp"></span>
                </div>
            </div>
            <div class="hourly-weather">
                Prévisions horaires
                <div class="hourly-scrollbar" id="hourly-scrollbar"></div>
            </div>
        </div>

        {# <div id="ww_8360d31da2298" v='1.3' loc='id' a='{"t":"horizontal","lang":"fr","sl_lpl":1,"ids":["wl7545"],"font":"Arial","sl_ics":"one_a","sl_sot":"celsius","cl_bkg":"image","cl_font":"#FFFFFF","cl_cloud":"#FFFFFF","cl_persp":"#81D4FA","cl_sun":"#FFC107","cl_moon":"#FFC107","cl_thund":"#FF5722","el_nme":3}'>Plus de prévisions: <a href="https://meteolongue.com/paris_meteo_25_jours/" id="ww_8360d31da2298_u" target="_blank">Météo 25 jours</a></div><script async src="https://app3.weatherwidget.org/js/?id=ww_8360d31da2298"></script> #}
    </div>    
</body>

</html>
